name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set tag
        id: vars
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:$TAG .
      
      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:$TAG

      - name: Test application locally
        run: |
          echo "Запускаем контейнер для тестирования..."
          docker run -d -p 3000:3000 --name test-app ${{ secrets.DOCKER_USERNAME }}/demo-app:$TAG
          sleep 5
          echo "Проверяем ответ приложения..."
          curl http://localhost:3000
          echo "Останавливаем и удаляем контейнер..."
          docker stop test-app
          docker rm test-app
